[build]
  command = "npm run build"
  publish = "dist"

# React Router: rutas profundas sin 404 en refresh (las functions se resuelven antes).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Local: `netlify dev` arranca Vite y proxy en :8888 sirviendo /.netlify/functions/*
[dev]
  command = "npm run dev"
  framework = "vite"
  targetPort = 5173
  port = 8888
